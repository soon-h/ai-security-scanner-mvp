name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Typecheck & test (airpod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airpod
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: airpod/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
